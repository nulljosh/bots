<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="24" fill="#0c0c0c"/>
  <!-- Fork -->
  <g transform="translate(72,40)">
    <!-- Tines -->
    <line x1="0" y1="0" x2="0" y2="40" stroke="#febc2e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="0" x2="8" y2="40" stroke="#febc2e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="16" y1="0" x2="16" y2="40" stroke="#febc2e" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Neck -->
    <path d="M0,40 Q0,52 8,52 Q16,52 16,40" fill="none" stroke="#febc2e" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Handle -->
    <line x1="8" y1="52" x2="8" y2="120" stroke="#febc2e" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Knife -->
  <g transform="translate(112,40)">
    <!-- Blade -->
    <path d="M0,0 L0,70 Q0,78 8,78 L16,78 L16,0 Q8,-2 0,0 Z" fill="none" stroke="#febc2e" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Blade edge highlight -->
    <line x1="0" y1="4" x2="0" y2="68" stroke="#febc2e" stroke-width="1" opacity="0.3"/>
    <!-- Bolster -->
    <rect x="-1" y="78" width="18" height="6" rx="1" fill="none" stroke="#febc2e" stroke-width="2"/>
    <!-- Handle -->
    <line x1="8" y1="84" x2="8" y2="120" stroke="#febc2e" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Label -->
  <text x="100" y="180" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#febc2e" text-anchor="middle" opacity="0.7">food</text>
</svg>