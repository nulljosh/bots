<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="24" fill="#0c0c0c"/>
  <!-- Pizza slice -->
  <g transform="translate(100,100)">
    <!-- Slice shape -->
    <path d="M0,-55 Q35,-50 50,10 L0,45 Q-35,-50 0,-55 Z" fill="#1a1a1a" stroke="#febc2e" stroke-width="2"/>
    <!-- Crust arc -->
    <path d="M0,-55 Q35,-50 50,10" fill="none" stroke="#d4a040" stroke-width="6" stroke-linecap="round"/>
    <!-- Cheese base -->
    <path d="M0,-45 Q28,-42 42,5 L0,38 Q-28,-42 0,-45 Z" fill="#febc2e" opacity="0.1"/>
    <!-- Pepperoni -->
    <circle cx="5" cy="-20" r="7" fill="none" stroke="#ff5f57" stroke-width="1.5" opacity="0.8"/>
    <circle cx="5" cy="-20" r="3" fill="#ff5f57" opacity="0.3"/>
    <circle cx="-8" cy="5" r="6" fill="none" stroke="#ff5f57" stroke-width="1.5" opacity="0.8"/>
    <circle cx="-8" cy="5" r="2.5" fill="#ff5f57" opacity="0.3"/>
    <circle cx="18" cy="-8" r="5.5" fill="none" stroke="#ff5f57" stroke-width="1.5" opacity="0.8"/>
    <circle cx="18" cy="-8" r="2" fill="#ff5f57" opacity="0.3"/>
    <circle cx="3" cy="20" r="5" fill="none" stroke="#ff5f57" stroke-width="1.5" opacity="0.7"/>
    <circle cx="3" cy="20" r="2" fill="#ff5f57" opacity="0.25"/>
  </g>
  <!-- Label -->
  <text x="100" y="172" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#febc2e" text-anchor="middle" opacity="0.7">food</text>
</svg>