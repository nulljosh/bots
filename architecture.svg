<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .box { fill: #1a1a1a; stroke: #0071e3; stroke-width: 2; }
      .label { fill: #e0e0e0; font-size: 13px; text-anchor: middle; }
      .sub { fill: #888; font-size: 10px; text-anchor: middle; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="800" height="200" fill="#111"/>

  <!-- bots/ monorepo root -->
  <rect x="20" y="75" width="100" height="50" rx="8" class="box"/>
  <text x="70" y="97" class="label">bots/</text>
  <text x="70" y="113" class="sub">monorepo</text>

  <!-- Fan-out arrows -->
  <line x1="122" y1="88" x2="158" y2="40" class="arrow"/>
  <line x1="122" y1="100" x2="158" y2="100" class="arrow"/>
  <line x1="122" y1="112" x2="158" y2="160" class="arrow"/>

  <!-- fony -->
  <rect x="160" y="18" width="130" height="40" rx="8" class="box"/>
  <text x="225" y="35" class="label">fony</text>
  <text x="225" y="50" class="sub">AI phone calls</text>

  <!-- foodie -->
  <rect x="160" y="78" width="130" height="40" rx="8" class="box"/>
  <text x="225" y="95" class="label">foodie</text>
  <text x="225" y="110" class="sub">food points API</text>

  <!-- callie -->
  <rect x="160" y="138" width="130" height="40" rx="8" class="box"/>
  <text x="225" y="155" class="label">callie</text>
  <text x="225" y="170" class="sub">daily briefing</text>

  <!-- Arrows to external services -->
  <line x1="292" y1="38" x2="368" y2="38" class="arrow"/>
  <line x1="292" y1="98" x2="368" y2="98" class="arrow"/>
  <line x1="292" y1="158" x2="368" y2="158" class="arrow"/>

  <!-- Twilio -->
  <rect x="370" y="18" width="130" height="40" rx="8" class="box"/>
  <text x="435" y="35" class="label">Twilio</text>
  <text x="435" y="50" class="sub">voice + TTS</text>

  <!-- DoorDash -->
  <rect x="370" y="78" width="130" height="40" rx="8" class="box"/>
  <text x="435" y="95" class="label">External APIs</text>
  <text x="435" y="110" class="sub">DoorDash, etc.</text>

  <!-- Twilio again for callie -->
  <rect x="370" y="138" width="130" height="40" rx="8" class="box"/>
  <text x="435" y="155" class="label">Twilio</text>
  <text x="435" y="170" class="sub">scheduled calls</text>

  <!-- Arrow to phone -->
  <line x1="502" y1="38" x2="548" y2="80" class="arrow"/>
  <line x1="502" y1="158" x2="548" y2="115" class="arrow"/>

  <!-- Phone -->
  <rect x="550" y="60" width="120" height="70" rx="8" class="box"/>
  <text x="610" y="90" class="label">Phone</text>
  <text x="610" y="106" class="sub">USER_PHONE</text>
</svg>
