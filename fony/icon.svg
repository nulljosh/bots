<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="24" fill="#0c0c0c"/>
  <!-- Phone -->
  <g transform="translate(100,90)">
    <!-- Phone body -->
    <rect x="-22" y="-50" width="44" height="80" rx="8" fill="#1a1a1a" stroke="#4a9eff" stroke-width="2"/>
    <!-- Screen -->
    <rect x="-17" y="-42" width="34" height="58" rx="3" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
    <!-- Call icon on screen -->
    <path d="M-8,-18 Q-12,-18 -12,-14 Q-10,-4 0,6 Q10,-4 12,-14 Q12,-18 8,-18" fill="none" stroke="#28c840" stroke-width="2" stroke-linecap="round"/>
    <!-- Sound waves -->
    <path d="M28,-15 Q35,-10 35,0 Q35,10 28,15" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M34,-22 Q44,-14 44,0 Q44,14 34,22" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <path d="M40,-28 Q52,-18 52,0 Q52,18 40,28" fill="none" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
    <!-- Home button -->
    <circle cx="0" cy="24" r="4" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
    <!-- AI indicator dots -->
    <circle cx="-6" cy="-30" r="1.5" fill="#28c840" opacity="0.5"/>
    <circle cx="0" cy="-30" r="1.5" fill="#28c840" opacity="0.7"/>
    <circle cx="6" cy="-30" r="1.5" fill="#28c840" opacity="0.5"/>
  </g>
  <!-- Label -->
  <text x="100" y="175" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#4a9eff" text-anchor="middle" opacity="0.7">fony</text>
</svg>