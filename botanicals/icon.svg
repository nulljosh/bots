<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="24" fill="#0c0c0c"/>
  <!-- Botanical plant/mortar -->
  <g transform="translate(100,95)">
    <!-- Mortar bowl -->
    <path d="M-35,15 Q-38,45 0,50 Q38,45 35,15 Z" fill="#1a1a1a" stroke="#3d9e6a" stroke-width="2"/>
    <ellipse cx="0" cy="15" rx="35" ry="8" fill="none" stroke="#3d9e6a" stroke-width="2"/>
    <!-- Pestle -->
    <line x1="20" y1="-5" x2="40" y2="-35" stroke="#3d9e6a" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="42" cy="-37" rx="6" ry="4" fill="none" stroke="#3d9e6a" stroke-width="2" transform="rotate(-25,42,-37)"/>
    <!-- Leaves coming out of mortar -->
    <path d="M-5,10 Q-15,-10 -25,-25 Q-10,-15 -5,10" fill="#3d9e6a" opacity="0.2" stroke="#3d9e6a" stroke-width="1.5"/>
    <path d="M5,8 Q8,-15 5,-35 Q12,-15 5,8" fill="#3d9e6a" opacity="0.2" stroke="#3d9e6a" stroke-width="1.5"/>
    <path d="M10,12 Q20,-5 30,-18 Q18,-2 10,12" fill="#3d9e6a" opacity="0.15" stroke="#3d9e6a" stroke-width="1.5"/>
    <!-- Small herb dots -->
    <circle cx="-8" cy="18" r="2" fill="#3d9e6a" opacity="0.3"/>
    <circle cx="6" cy="20" r="1.5" fill="#3d9e6a" opacity="0.25"/>
    <circle cx="14" cy="17" r="1.5" fill="#3d9e6a" opacity="0.2"/>
  </g>
  <!-- Label -->
  <text x="100" y="175" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#3d9e6a" text-anchor="middle" opacity="0.7">botanicals</text>
</svg>