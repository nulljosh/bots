<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="24" fill="#0c0c0c"/>
  <!-- Cannabis leaf -->
  <g transform="translate(100,95)" fill="none" stroke="#28c840" stroke-width="2" stroke-linecap="round">
    <!-- Center leaflet -->
    <path d="M0,35 Q-3,15 -8,-5 Q-2,-15 0,-40 Q2,-15 8,-5 Q3,15 0,35" fill="#28c840" opacity="0.15"/>
    <path d="M0,35 Q-3,15 -8,-5 Q-2,-15 0,-40 Q2,-15 8,-5 Q3,15 0,35"/>
    <!-- Left leaflets -->
    <path d="M0,20 Q-12,8 -28,-8 Q-18,-10 -15,-25 Q-8,-12 0,5" fill="#28c840" opacity="0.1"/>
    <path d="M0,20 Q-12,8 -28,-8 Q-18,-10 -15,-25 Q-8,-12 0,5"/>
    <path d="M0,25 Q-18,18 -38,8 Q-28,2 -28,-12 Q-18,0 0,12" fill="#28c840" opacity="0.1"/>
    <path d="M0,25 Q-18,18 -38,8 Q-28,2 -28,-12 Q-18,0 0,12"/>
    <!-- Right leaflets (mirror) -->
    <path d="M0,20 Q12,8 28,-8 Q18,-10 15,-25 Q8,-12 0,5" fill="#28c840" opacity="0.1"/>
    <path d="M0,20 Q12,8 28,-8 Q18,-10 15,-25 Q8,-12 0,5"/>
    <path d="M0,25 Q18,18 38,8 Q28,2 28,-12 Q18,0 0,12" fill="#28c840" opacity="0.1"/>
    <path d="M0,25 Q18,18 38,8 Q28,2 28,-12 Q18,0 0,12"/>
    <!-- Stem -->
    <line x1="0" y1="35" x2="0" y2="55" stroke-width="2.5"/>
    <!-- Center vein -->
    <line x1="0" y1="5" x2="0" y2="-35" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Label -->
  <text x="100" y="172" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#28c840" text-anchor="middle" opacity="0.7">weedbot</text>
  <!-- Version dot -->
  <circle cx="100" cy="182" r="2" fill="#28c840" opacity="0.3"/>
</svg>