<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="24" fill="#0c0c0c"/>
  <!-- Coffee cup -->
  <g transform="translate(100,105)">
    <!-- Cup body -->
    <path d="M-30,-35 L-25,40 Q-24,48 0,48 Q24,48 25,40 L30,-35 Z" fill="#1a1a1a" stroke="#00704a" stroke-width="2"/>
    <!-- Cup band -->
    <rect x="-28" y="-5" width="56" height="18" rx="2" fill="none" stroke="#00704a" stroke-width="1.5" opacity="0.5"/>
    <!-- Starbucks star (simplified) -->
    <polygon points="0,-30 3,-22 12,-22 5,-16 8,-8 0,-13 -8,-8 -5,-16 -12,-22 -3,-22" fill="none" stroke="#00704a" stroke-width="1" opacity="0.6"/>
    <!-- Lid -->
    <path d="M-32,-35 Q-32,-42 0,-42 Q32,-42 32,-35 Z" fill="#1a1a1a" stroke="#00704a" stroke-width="2"/>
    <!-- Lid top -->
    <ellipse cx="0" cy="-42" rx="20" ry="4" fill="none" stroke="#00704a" stroke-width="1.5" opacity="0.5"/>
    <!-- Steam -->
    <path d="M-8,-50 Q-10,-58 -6,-65" fill="none" stroke="#00704a" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M2,-50 Q0,-60 4,-68" fill="none" stroke="#00704a" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M12,-50 Q14,-57 10,-63" fill="none" stroke="#00704a" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Label -->
  <text x="100" y="178" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#00704a" text-anchor="middle" opacity="0.7">starbot</text>
</svg>